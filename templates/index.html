<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Stage292 - Verification URL UI (SQLite)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Stage292</h1>
      <p class="subtitle">Verification URL UI + SQLite Persistence</p>
      <div class="badges">
        <span>Page Stage: 292</span>
        <span>Storage: SQLite</span>
        <span>Fail-Closed: Enabled</span>
      </div>
    </header>

    <section class="panel">
      <h2>検証フォーム</h2>
      <label for="url">URL</label>
      <input id="url" type="text" value="https://example.com/verify">

      <label for="manifest">manifest JSON</label>
      <textarea id="manifest" rows="16">{
  "url": "https://example.com/verify",
  "subject": {
    "name": "sample"
  },
  "evidence": [
    {"type": "sha256", "ok": true}
  ],
  "verification_policy": {
    "fail_closed": true
  }
}</textarea>

      <div class="actions">
        <button id="sampleBtn" type="button">サンプル入力</button>
        <button id="verifyBtn" type="button">検証してSQLiteに保存</button>
      </div>
    </section>

    <section class="panel">
      <h2>最新結果</h2>
      <div id="resultCard" class="result-card empty">まだ検証結果はありません。</div>
    </section>

    <section class="panel">
      <h2>保存履歴</h2>
      <button id="refreshBtn" type="button">履歴を更新</button>
      <div id="history" class="history"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
